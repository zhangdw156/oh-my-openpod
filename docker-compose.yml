services:
  openpod:
    build:
      context: .
      network: host
    image: oh-my-openpod:0.4.0.dev4
    container_name: openpod
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:-~/projects}:/workspace
      - ${OPENCODE_CONFIG:-./opencode.json.example}:/root/.config/opencode/config.json:ro
    env_file:
      - path: .env
        required: false
    network_mode: host
    restart: "no"
