services:
  openpod:
    build: .
    image: oh-my-openpod:latest
    container_name: oh-my-openpod
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:-~/projects}:/workspace
      - ${OPENCODE_CONFIG:-./opencode.json.example}:/root/.config/opencode/config.json:ro
    env_file:
      - path: .env
        required: false
    network_mode: host
    restart: "no"
