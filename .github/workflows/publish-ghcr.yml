name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing" >&2
            exit 1
          fi

          mapfile -t version_lines < <(tr -d '\r' < VERSION)
          version="${version_lines[0]:-}"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi

          for ((i = 1; i < ${#version_lines[@]}; i++)); do
            if [[ -n "${version_lines[i]}" ]]; then
              echo "VERSION file contains extra non-empty line #$((i + 1)): ${version_lines[i]}" >&2
              exit 1
            fi
          done

          if ! [[ "$version" =~ ^[[:digit:]]+(\.[[:digit:]]+)+(\.dev[[:digit:]]+)?$ ]]; then
            echo "VERSION file contains an unexpected value: ${version}" >&2
            exit 1
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          base_image_name="ghcr.io/${owner}/oh-my-devpod"
          openpod_image_name="ghcr.io/${owner}/oh-my-openpod"
          claudepod_image_name="ghcr.io/${owner}/oh-my-claudepod"
          codexpod_image_name="ghcr.io/${owner}/oh-my-codexpod"

          publish="true"
          if [[ "$version" =~ \.dev[0-9]+$ ]]; then
            publish="false"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "base_image_name=$base_image_name" >> "$GITHUB_OUTPUT"
          echo "openpod_image_name=$openpod_image_name" >> "$GITHUB_OUTPUT"
          echo "claudepod_image_name=$claudepod_image_name" >> "$GITHUB_OUTPUT"
          echo "codexpod_image_name=$codexpod_image_name" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Skip dev image versions
        if: steps.version.outputs.publish != 'true'
        run: |
          echo "VERSION is ${VERSION}; skipping GHCR publish for this development tag."
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate base Docker metadata
        if: steps.version.outputs.publish == 'true'
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.base_image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=oh-my-openpod container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push devpod base image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.devpod
          push: true
          provenance: false
          tags: ${{ steps.meta_base.outputs.tags }}
          labels: ${{ steps.meta_base.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push openpod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/openpod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.openpod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.openpod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push claudepod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/claudepod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.claudepod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.claudepod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push codexpod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/codexpod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.codexpod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.codexpod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          if [[ "${PUBLISH}" != "true" ]]; then
            echo "Skipped publishing because the pod-local compose files use a development version \`${VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "Published Docker images:"
            echo "- \`${BASE_IMAGE}:${VERSION}\`"
            echo "- \`${OPENPOD_IMAGE}:${VERSION}\`"
            echo "- \`${CLAUDEPOD_IMAGE}:${VERSION}\`"
            echo "- \`${CODEXPOD_IMAGE}:${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          BASE_IMAGE: ${{ steps.version.outputs.base_image_name }}
          OPENPOD_IMAGE: ${{ steps.version.outputs.openpod_image_name }}
          CLAUDEPOD_IMAGE: ${{ steps.version.outputs.claudepod_image_name }}
          CODEXPOD_IMAGE: ${{ steps.version.outputs.codexpod_image_name }}
          PUBLISH: ${{ steps.version.outputs.publish }}
          VERSION: ${{ steps.version.outputs.version }}
