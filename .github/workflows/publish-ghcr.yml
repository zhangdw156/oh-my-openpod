name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          extract_tag() {
            local compose_file="$1"
            local image_name="$2"

            sed -nE "s/^[[:space:]]*image:[[:space:]]*${image_name}:([^[:space:]]+)[[:space:]]*$/\\1/p" "${compose_file}" | head -n 1
          }

          compose_files=(
            "docker/openpod/docker-compose.yaml:oh-my-openpod"
            "docker/claudepod/docker-compose.yaml:oh-my-claudepod"
            "docker/codexpod/docker-compose.yaml:oh-my-codexpod"
          )

          tags=()
          for entry in "${compose_files[@]}"; do
            compose_file="${entry%%:*}"
            image_name="${entry##*:}"

            flavor_tag="$(extract_tag "${compose_file}" "${image_name}")"
            devpod_tag="$(extract_tag "${compose_file}" "oh-my-devpod")"

            if [[ -z "${flavor_tag}" || -z "${devpod_tag}" ]]; then
              echo "Unable to resolve image tags from ${compose_file}" >&2
              exit 1
            fi

            tags+=("${flavor_tag}" "${devpod_tag}")
          done

          version="$(printf '%s\n' "${tags[@]}" | sort -u | head -n 1)"
          if [[ "$(printf '%s\n' "${tags[@]}" | sort -u | wc -l | tr -d ' ')" != "1" ]]; then
            echo "Compose image tags are inconsistent across docker/<flavor>/docker-compose.yaml files" >&2
            printf 'Resolved tags:\n%s\n' "${tags[*]}" >&2
            exit 1
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          base_image_name="ghcr.io/${owner}/oh-my-devpod"
          openpod_image_name="ghcr.io/${owner}/oh-my-openpod"
          claudepod_image_name="ghcr.io/${owner}/oh-my-claudepod"
          codexpod_image_name="ghcr.io/${owner}/oh-my-codexpod"

          publish="true"
          if [[ "$version" == *-dev || "$version" =~ \.dev[0-9]+$ ]]; then
            publish="false"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "base_image_name=$base_image_name" >> "$GITHUB_OUTPUT"
          echo "openpod_image_name=$openpod_image_name" >> "$GITHUB_OUTPUT"
          echo "claudepod_image_name=$claudepod_image_name" >> "$GITHUB_OUTPUT"
          echo "codexpod_image_name=$codexpod_image_name" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Skip dev image versions
        if: steps.version.outputs.publish != 'true'
        run: |
          echo "Pod-local compose files use ${VERSION}; skipping GHCR publish."
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate base Docker metadata
        if: steps.version.outputs.publish == 'true'
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.base_image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=oh-my-openpod container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push devpod base image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.devpod
          push: true
          provenance: false
          tags: ${{ steps.meta_base.outputs.tags }}
          labels: ${{ steps.meta_base.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push openpod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/openpod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.openpod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.openpod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push claudepod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/claudepod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.claudepod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.claudepod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push codexpod image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/codexpod/Dockerfile
          build-args: |
            DEVPOD_BASE_IMAGE=${{ steps.version.outputs.base_image_name }}:${{ steps.version.outputs.version }}
          push: true
          provenance: false
          tags: ${{ steps.version.outputs.codexpod_image_name }}:${{ steps.version.outputs.version }},${{ steps.version.outputs.codexpod_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          if [[ "${PUBLISH}" != "true" ]]; then
            echo "Skipped publishing because the pod-local compose files use a development version \`${VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "Published Docker images:"
            echo "- \`${BASE_IMAGE}:${VERSION}\`"
            echo "- \`${OPENPOD_IMAGE}:${VERSION}\`"
            echo "- \`${CLAUDEPOD_IMAGE}:${VERSION}\`"
            echo "- \`${CODEXPOD_IMAGE}:${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          BASE_IMAGE: ${{ steps.version.outputs.base_image_name }}
          OPENPOD_IMAGE: ${{ steps.version.outputs.openpod_image_name }}
          CLAUDEPOD_IMAGE: ${{ steps.version.outputs.claudepod_image_name }}
          CODEXPOD_IMAGE: ${{ steps.version.outputs.codexpod_image_name }}
          PUBLISH: ${{ steps.version.outputs.publish }}
          VERSION: ${{ steps.version.outputs.version }}
