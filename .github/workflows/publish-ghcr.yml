name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          image_ref="$(sed -nE 's/^[[:space:]]*image:[[:space:]]*([^[:space:]]+)[[:space:]]*$/\1/p' docker-compose.yml | head -n 1)"
          if [[ -z "$image_ref" ]]; then
            echo "Unable to find an image entry in docker-compose.yml" >&2
            exit 1
          fi

          version="${image_ref##*:}"
          if [[ -z "$version" || "$version" == "$image_ref" ]]; then
            echo "Unable to extract an image tag from: $image_ref" >&2
            exit 1
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          image_name="ghcr.io/${owner}/${repo}"

          publish="true"
          if [[ "$version" == *-dev ]]; then
            publish="false"
          fi

          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Skip dev image versions
        if: steps.version.outputs.publish != 'true'
        run: |
          echo "docker-compose.yml uses ${VERSION}; skipping GHCR publish."
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.version.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=oh-my-openpod container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          if [[ "${PUBLISH}" != "true" ]]; then
            echo "Skipped publishing because docker-compose.yml uses dev tag \`${VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "Published Docker images:"
            echo "- \`${IMAGE_NAME}:${VERSION}\`"
            echo "- \`${IMAGE_NAME}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          IMAGE_NAME: ${{ steps.version.outputs.image_name }}
          PUBLISH: ${{ steps.version.outputs.publish }}
          VERSION: ${{ steps.version.outputs.version }}
