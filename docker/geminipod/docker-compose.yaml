services:
  devpod:
    build:
      context: ../..
      dockerfile: Dockerfile.devpod
      network: host
    image: devpod:${IMAGE_VERSION:-local}
  geminipod:
    build:
      context: ../..
      dockerfile: docker/geminipod/Dockerfile
      network: host
      additional_contexts:
        devpod: service:devpod
      args:
        DEVPOD_BASE_IMAGE: devpod
    image: geminipod:${IMAGE_VERSION:-local}
    container_name: geminipod
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:-../..}:/workspace
    network_mode: host
    restart: "no"
