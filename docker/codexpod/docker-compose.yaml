services:
  devpod:
    build:
      context: ../..
      dockerfile: Dockerfile.devpod
      network: host
    image: oh-my-devpod:0.4.0.dev5
  codexpod:
    build:
      context: ../..
      dockerfile: docker/codexpod/Dockerfile
      network: host
      additional_contexts:
        devpod: service:devpod
      args:
        DEVPOD_BASE_IMAGE: devpod
    image: oh-my-codexpod:0.4.0.dev5
    container_name: codexpod
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:-../..}:/workspace
    network_mode: host
    restart: "no"
